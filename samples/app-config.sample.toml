# Application-level defaults for merge-warden-server.
#
# This file is loaded via the MERGE_WARDEN_CONFIG_FILE environment variable.
# It supplies fallback policy defaults that apply to every repository processed
# by this server instance.  Values here are used when a repository has no
# .github/merge-warden.toml of its own, or when a per-repo file omits a field.
#
# Field names here use the same snake_case convention as the per-repo config
# (merge-warden.sample.toml).
#
# Configuration is resolved through a four-tier merge chain:
#   app_defaults → org_defaults → repo_config → org_enforced → enforcement_flags
# See docs/architecture.md for the full Configuration Architecture section.

# ---------------------------------------------------------------------------
# Org-level policy source (optional).
#
# When configured, merge-warden fetches a central org policy TOML file and
# inserts it into the config resolution chain:
#   - [enforced] section — cannot be overridden by per-repo config
#   - [defaults] section — can be overridden by per-repo config
#
# See samples/merge-warden-org-policy.sample.toml for the format of that file.
#
# [org_policy_source]
# owner = "my-org"
# repo  = "platform-configs"
# path  = "merge-warden/org-policy.toml"
# # fail_if_unreachable = false   # set true to block PR processing when unreachable
# ---------------------------------------------------------------------------

[policies]
# Enforce conventional-commit title format for all repositories by default.
# The pattern below is the built-in conventional commit regex; uncomment and
# edit to override.
enable_title_validation = true
# default_title_pattern = "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([a-z0-9_-]+\\))?!?: .+"
default_invalid_title_label = "pr-issue: invalid-title-format"

# The mention string that users write in PR comments to issue bot commands.
# Default: "@merge-warden". Change this if you have deployed the bot under a
# different GitHub App name (e.g. "@acme-merge-warden").
# bot_mention = "@merge-warden"

# Require a work-item reference in the pull request description by default.
enable_work_item_validation = true
# default_work_item_pattern = "(?i)(fixes|closes|resolves|references|relates to)\\s+(#\\d+|GH-\\d+|https://github\\.com/[^/]+/[^/]+/issues/\\d+|[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+#\\d+)"
default_missing_work_item_label = "pr-issue: missing-work-item"

# PR size checking — disabled by default at app level.
[policies.pr_size_check]
enabled = false
fail_on_oversized = false
excluded_file_patterns = ["*.md", "*.txt", "docs/*"]
# When true, only additions are counted; deleted lines do not inflate the PR size.
ignore_deletions = false
label_prefix = "size/"
add_comment = true

# Optional: Custom size thresholds (uncomment to override the built-in defaults).
# [policies.pr_size_check.thresholds]
# xs = 10    # 1-10 lines
# s = 50     # 11-50 lines
# m = 100    # 51-100 lines
# l = 250    # 101-250 lines
# xl = 500   # 251-500 lines
# xxl = 501+ lines (anything above xl)

# WIP detection — disabled by default at app level.
[policies.wip_check]
enforce_wip_blocking = true
wip_label = "WIP"
wip_title_patterns = ["WIP", "wip:", "[wip]", "draft:", "Draft:"]
wip_description_patterns = []

# PR state lifecycle labels — disabled by default at app level.
[policies.pr_state_labels]
enabled = true
draft_label = "status: draft"
review_label = "status: in-review"
approved_label = "status: approved"

# Renovate stability-days label management — reflects the state of the
# Renovate `renovate/stability-days` commit-status check as a label. Purely
# informational: never blocks merging or affects the check conclusion.
[policies.renovate_stability]
# Once enabled here or by any repository, the feature stays enabled — a repo
# cannot set `enabled = false` to opt back out. To disable for every
# repository, set `enabled = false` here and do not enable it per-repo.
enabled = true
pending_stability_label = "pr-validation: pending-stability"

# Change-type label detection — maps conventional-commit types to
# repository-specific labels, applied to every repository unless overridden
# by its own .github/merge-warden.toml.
[policies.change_type_labels]
enabled = true

[policies.change_type_labels.conventional_commit_mappings]
feat = ["enhancement", "feature"]
fix = ["bug", "bugfix"]
docs = ["documentation"]
style = ["style", "formatting"]
refactor = ["refactor", "refactoring"]
perf = ["performance", "optimization"]
test = ["test", "tests", "testing"]
chore = ["chore", "maintenance"]
ci = ["ci", "continuous integration"]
build = ["build", "dependencies"]
revert = ["revert"]

[policies.change_type_labels.fallback_label_settings]
# Template for created label names. Use {change_type} as a placeholder.
name_format = "type: {change_type}"
# When true, a new repository label is created if no existing label matches.
create_if_missing = true

[policies.change_type_labels.fallback_label_settings.color_scheme]
feat = "#0075ca"
fix = "#d73a4a"
docs = "#0052cc"
style = "#f9d0c4"
refactor = "#fef2c0"
perf = "#a2eeef"
test = "#d4edda"
chore = "#e1e4e8"
ci = "#fbca04"
build = "#c5def5"
revert = "#b60205"

[policies.change_type_labels.detection_strategy]
exact_match = true
prefix_match = true
description_match = true
common_prefixes = ["type:", "kind:", "category:"]

# Labels applied based on keywords in the PR title or body, independent of the
# conventional-commit type. All fields are optional; omitted fields fall back
# to the built-in defaults shown below.
[policies.change_type_labels.keyword_labels]
breaking_change = "breaking-change"
security = "security"
hotfix = "hotfix"
tech_debt = "tech-debt"

# Bypass rules — allow specific GitHub usernames to skip validations.
[policies.bypass_rules.title_convention]
enabled = false
users = []

[policies.bypass_rules.work_items]
enabled = false
users = []

[policies.bypass_rules.size]
enabled = false
users = []

# Repository scope filtering — restricts which repositories this server
# instance actively processes, independent of which repositories the GitHub
# App installation can technically access. Useful for large orgs where GitHub
# only offers "All repositories" as an install-scope option.
#
# Omit this section entirely to process every repository the GitHub App is
# installed on (the pre-existing, backward-compatible behaviour). An explicit
# empty include_patterns list is a fail-closed "pause everything" lever.
# See docs/user/how-to/configure-repository-scope.md for details.
#
# [policies.repository_scope]
# include_patterns = ["payments-*", "checkout", "billing-?"]
# exclude_patterns = ["payments-legacy"]
