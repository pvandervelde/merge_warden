# Org-level policy configuration for merge-warden.
#
# This file is fetched from a **central repository** by the merge-warden server
# at runtime — it is NOT placed in each repository being guarded.
#
# To enable org-level policies, add an `[org_policy_source]` section to your
# app-level config (app-config.sample.toml):
#
#   [org_policy_source]
#   owner = "my-org"
#   repo  = "platform-configs"
#   path  = "merge-warden/org-policy.toml"
#   # fail_if_unreachable = false   # set true to block processing when unreachable
#
# The server fetches this file once per PR event using the GitHub App credentials
# already configured for the server instance.
#
# ---
# Schema version — always 1.
schemaVersion = 1

# ---------------------------------------------------------------------------
# [enforced] — settings that CANNOT be overridden by per-repo config.
#
# Use this section for policies that apply uniformly across every repository
# in the organisation, regardless of what the per-repo .github/merge-warden.toml
# says.  Org-enforced settings beat both repo defaults and per-repo overrides.
# ---------------------------------------------------------------------------
[enforced.policies.pullRequests.prTitle]
# Force conventional-commit title format on every repo in the org.
required = true
# pattern = "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([a-z0-9_-]+\\))?!?: .+"
label_if_missing = "pr-issue: invalid-title-format"

# Uncomment to enforce work-item references org-wide, regardless of per-repo opt-out.
# [enforced.policies.pullRequests.workItem]
# required = true
# label_if_missing = "pr-issue: missing-work-item"

# Uncomment to enforce PR size checking org-wide (including size thresholds and
# file exclusions that repositories cannot relax).
# [enforced.policies.pullRequests.prSize]
# enabled = true
# fail_on_oversized = false
# label_prefix = "size/"
# add_comment = true
# # When true, only additions count; deleted lines do not inflate the PR size.
# ignore_deletions = false
# # Glob patterns for files excluded from the line count.
# excluded_file_patterns = ["*.md", "*.txt", "docs/**", "**/*.lock"]
#
# [enforced.policies.pullRequests.prSize.thresholds]
# xs = 10
# s  = 50
# m  = 100
# l  = 250
# xl = 500

# Uncomment to enforce WIP blocking org-wide.
# [enforced.policies.pullRequests.wip]
# enforce_wip_blocking = true

# Uncomment to enforce PR state lifecycle labels org-wide.
# [enforced.policies.pullRequests.prState]
# enabled = true
# draft_label    = "status: draft"
# review_label   = "status: in-review"
# approved_label = "status: approved"

# Uncomment to enforce issue metadata propagation org-wide.
# [enforced.policies.pullRequests.issuePropagation]
# sync_milestone_from_issue = true
# sync_project_from_issue   = true

# Uncomment to force Renovate stability-days label management on for every
# repo in the org. Note the merge rule is OR: an enforced `enabled = true`
# cannot be turned off by any lower tier, but an enforced `enabled = false`
# also cannot turn off a `true` set by a lower tier — use [defaults] instead
# if you want repos to be able to opt in/out.
# [enforced.policies.pullRequests.renovateStability]
# enabled = true
# pending_stability_label = "pr-validation: pending-stability"

# Uncomment to enforce bot bypasses org-wide (repos cannot remove these users from the bypass list).
# [enforced.policies.bypassRules.title_convention]
# enabled = true
# users   = ["renovate[bot]", "dependabot[bot]"]
#
# [enforced.policies.bypassRules.work_items]
# enabled = true
# users   = ["renovate[bot]", "dependabot[bot]"]
#
# [enforced.policies.bypassRules.size]
# enabled = true
# users   = ["renovate[bot]", "dependabot[bot]"]

# ---------------------------------------------------------------------------
# [defaults] — org-wide defaults that CAN be overridden by per-repo config.
#
# Use this section for sensible org defaults that individual repositories may
# legitimately need to customise (e.g. a different work-item pattern for a
# specific team).  Per-repo config always wins over org defaults.
# ---------------------------------------------------------------------------
[defaults.policies.pullRequests.workItem]
# Org-wide default: require a work-item reference but allow repos to opt out.
required = true
# Default pattern matches GitHub issue references and common tracker formats.
# pattern = "(?i)(fixes|closes|resolves|references|relates to)\\s+(#\\d+|GH-\\d+|https://github\\.com/[^/]+/[^/]+/issues/\\d+|[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+#\\d+)"
label_if_missing = "pr-issue: missing-work-item"

# Org-wide default for size checking.
[defaults.policies.pullRequests.prSize]
enabled = true
fail_on_oversized = false
label_prefix = "size/"
add_comment = true
# When true, only additions count; deleted lines do not inflate the PR size.
ignore_deletions = false
# Glob patterns for files excluded from the line count.
excluded_file_patterns = ["*.md", "*.txt", "docs/**", "**/*.lock"]

# Optional: override the default size tier line-count boundaries.
[defaults.policies.pullRequests.prSize.thresholds]
xs = 10
s  = 50
m  = 100
l  = 250
xl = 500

# Org-wide default for PR state lifecycle labels.
# Repos may override individual label names or disable the feature entirely.
# [defaults.policies.pullRequests.prState]
# enabled = true
# draft_label    = "status: draft"
# review_label   = "status: in-review"
# approved_label = "status: approved"

# Org-wide default for issue metadata propagation.
# [defaults.policies.pullRequests.issuePropagation]
# sync_milestone_from_issue = false
# sync_project_from_issue   = false

# Org-wide default for Renovate stability-days label management. Repos may
# still enable this even when it is off here (the merge rule is OR), but
# cannot disable it once any tier has set `enabled = true`.
# [defaults.policies.pullRequests.renovateStability]
# enabled = true
# pending_stability_label = "pr-validation: pending-stability"

# Change-type label defaults at org level.
# Repos may override individual label names or the fallback settings.
# [defaults.change_type_labels]
# enabled = true
#
# [defaults.change_type_labels.conventional_commit_mappings]
# feat     = ["enhancement", "feature"]
# fix      = ["bug", "bugfix", "fix"]
# docs     = ["documentation", "docs"]
# style    = ["style", "formatting"]
# refactor = ["refactor", "refactoring"]
# perf     = ["performance", "optimization"]
# test     = ["test", "tests", "testing"]
# chore    = ["chore", "maintenance"]
# ci       = ["ci", "continuous integration"]
# build    = ["build", "dependencies"]
# revert   = ["revert"]
#
# [defaults.change_type_labels.fallback_label_settings]
# # Template for created label names. Use {change_type} as a placeholder.
# name_format      = "type: {change_type}"
# # When true, a new repository label is created if no existing label matches.
# create_if_missing = true
#
# [defaults.change_type_labels.fallback_label_settings.color_scheme]
# feat     = "#0075ca"
# fix      = "#d73a4a"
# docs     = "#0052cc"
# style    = "#f9d0c4"
# refactor = "#fef2c0"
# perf     = "#a2eeef"
# test     = "#d4edda"
# chore    = "#e1e4e8"
# ci       = "#fbca04"
# build    = "#c5def5"
# revert   = "#b60205"
#
# [defaults.change_type_labels.keyword_labels]
# breaking_change = "breaking-change"
# security        = "security"
# hotfix          = "hotfix"
# tech_debt       = "tech-debt"

# Org-wide default bypass rules for well-known automation bots.
# Repos may override these by specifying their own [policies.bypassRules.*] sections.
# [defaults.policies.bypassRules.title_convention]
# enabled = true
# users   = ["renovate[bot]", "dependabot[bot]", "release-regent[bot]"]
#
# [defaults.policies.bypassRules.work_items]
# enabled = true
# users   = ["renovate[bot]", "dependabot[bot]", "release-regent[bot]"]
#
# [defaults.policies.bypassRules.size]
# enabled = true
# users   = ["renovate[bot]", "dependabot[bot]", "release-regent[bot]"]

# ---------------------------------------------------------------------------
# [[conditional_policies]] — policies applied only when a condition matches.
#
# Each `[[conditional_policies]]` block is evaluated at runtime against the
# target repository's topics and custom properties.  Only blocks whose
# condition matches are merged into the policy chain for that PR.
#
# Merge chain position:
#   app_defaults → org_defaults → conditional_defaults* → repo →
#   conditional_enforced* → org_enforced → app_enforced
#
# Condition semantics:
#   • has_any_topic:        OR match (any one topic is sufficient), case-insensitive.
#   • has_custom_property:  AND match (all key-value pairs must be present, values case-sensitive).
#   • Both criteria combined with AND (both must be satisfied simultaneously).
#   • An empty condition always matches every repository.
#
# Custom properties require a GitHub Enterprise plan and the
# `org_custom_property: read` permission on the GitHub App.  On non-enterprise
# GitHub plans the properties API returns 403/404 and is treated as an empty
# map — topic-based conditions continue to work on all plans.
#
# Example: apply stricter title requirements to repositories tagged "payments".
# ---------------------------------------------------------------------------

# [[conditional_policies]]
# [conditional_policies.condition]
# # Repositories with this topic will have the policy below applied.
# has_any_topic = ["payments", "finance"]
#
# [conditional_policies.enforced.policies.pullRequests.prTitle]
# # All payments/finance repos must use the PAY- prefix (cannot be overridden).
# required = true
# pattern = "^PAY-[0-9]+: .+"
# label_if_missing = "pr-issue: invalid-title-format"

# Example: use custom properties to target repositories owned by a specific team.
# [[conditional_policies]]
# [conditional_policies.condition]
# [conditional_policies.condition.has_custom_property]
# team = "platform"
# env  = "prod"
#
# [conditional_policies.defaults.policies.pullRequests.workItem]
# # Platform/prod repos get a specific work-item pattern as an org default
# # (overridable by each repo's own config).
# required = true
# pattern = "PLAT-[0-9]+"
